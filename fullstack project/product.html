<!DOCTYPE html>
<html>
<head>
  <title>Product View</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">MyShop</a>
    <div>
      <a href="products.html" class="btn btn-light me-2">Products</a>
      <a href="cart.html" class="btn btn-light">Cart</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="row">

    <div class="col-md-6">
      <img id="productImg" class="img-fluid">
    </div>

    <div class="col-md-6">
      <h2 id="productName"></h2>
      <p><strong>Price:</strong> ₹<span id="productPrice"></span></p>
      <p><strong>Description:</strong> Good quality product.</p>

      <button id="cartBtn" class="btn btn-primary">Add to Cart</button>
    </div>

  </div>
</div>

<script src="script.js"></script>

<script>
const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const price = params.get("price");
const img = params.get("img");

document.getElementById("productName").innerText = name;
document.getElementById("productPrice").innerText = price;
document.getElementById("productImg").src = img;

document.getElementById("cartBtn").onclick = function() {
  addToCart(name, parseInt(price));
};
</script>

</body>
</html>
