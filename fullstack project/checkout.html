<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">MyShop</a>
    <div>
      <a href="products.html" class="btn btn-light me-2">Products</a>
      <a href="cart.html" class="btn btn-light">Cart</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2>Checkout</h2>

  <form onsubmit="placeOrder(event)">
    <input type="text" class="form-control mb-3" placeholder="Full Name" required>
    <input type="text" class="form-control mb-3" placeholder="Address" required>
    <input type="text" class="form-control mb-3" placeholder="Phone Number" required>

    <button type="submit" class="btn btn-success">Place Order</button>
  </form>
</div>

<script>
function placeOrder(e){
  e.preventDefault();
  localStorage.removeItem("cart");
  window.location.href="order.html";
}
</script>

<script src="script.js"></script>

</body>
</html>
